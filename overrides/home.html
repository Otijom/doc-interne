{% extends "main.html" %}

{% block tabs %}
  {{ super() }}
  <style>
    /* Masquer le menu latéral pour la page d'accueil */
    .md-sidebar { display: none !important; }
    
    /* Le conteneur principal Hero en mode "Flex" (Texte à gauche, Image à droite) */
    .tx-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1220px; /* Aligné sur la largeur standard MkDocs */
      margin: 0 auto;
      padding: 3rem 1rem 4rem 1rem;
      gap: 3rem;
    }

    /* La colonne de gauche (Le texte) */
    .tx-hero__content {
      flex: 1;
      text-align: left;
    }
    .tx-hero__content h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--md-default-fg-color);
      line-height: 1.2;
    }
    .tx-hero__content p {
      font-size: 0.75rem;
      color: var(--md-default-fg-color--light);
      margin-bottom: 2rem;
    }

    /* La colonne de droite (L'image animée) */
    .tx-hero__image {
      flex: 1;
      display: flex;
      justify-content: center;
    }
    .tx-hero__image img {
      max-width: 100%;
      height: auto;
      /* AJOUT DE L'ANIMATION DE FLOTTEMENT */
      animation: float 6s ease-in-out infinite; 
    }

    /* Animation CSS pour faire "flotter" l'image doucement */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    /* Mode Mobile : On empile le texte et l'image au centre */
    @media screen and (max-width: 76.24em) {
      .tx-hero {
        flex-direction: column-reverse; /* L'image passe au-dessus du texte sur mobile */
        text-align: center;
        padding: 2rem 1rem;
      }
      .tx-hero__content {
        text-align: center;
      }
      .tx-hero__image img {
        max-width: 80%;
      }
    }
  /* LE BANDEAU 100% ET L'ENCART GRIS CLAIR (#F2F2EE) */
    .tx-fullwidth-band {
      width: 100vw; 
      position: relative; 
      left: 50%; right: 50%;
      margin-left: -50vw; margin-right: -50vw;
      padding: 4rem 0;
      margin-top: 4rem; /* Espace au-dessus du bandeau */
      background-color: transparent;
    }

    .tx-rounded-insert {
      max-width: 1220px; 
      margin: 0 auto;
      background-color: #F2F2EE; 
      color: var(--md-default-fg-color); 
      padding: 4rem 2rem; 
      border-radius: 24px; 
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    .tx-rounded-insert h2 { color: var(--md-default-fg-color) !important; font-weight: 700; margin-top: 0; }
    .tx-rounded-insert p { color: var(--md-default-fg-color--light) !important; font-size: 1.2rem; margin-bottom: 2rem; }

    /* Marges pour mobile */
    @media screen and (max-width: 76.24em) {
      .tx-rounded-insert { margin: 0 1rem; border-radius: 16px; }
    }
  </style>
{% endblock %}

{% block content %}
  <div class="md-typeset">
    {{ super() }}
  </div>
{% endblock %}
